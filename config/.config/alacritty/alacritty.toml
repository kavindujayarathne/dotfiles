[general]
live_config_reload = true
import = [
    "~/.config/alacritty/themes/catppuccin-mocha.toml"
]

[env]
TERM = "xterm-256color"

# Window
[window]
padding = {x = 10, y =10}
# dynamic_padding = true
decorations = "Buttonless"
# opacity = 0.8
# opacity = 0.7
blur = true
option_as_alt = "both"

# Font
[font]
normal.family = "MesloLGS Nerd Font Mono"
size = 16

# Keybindings
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

# Debugging
[debug]
render_timer = false
